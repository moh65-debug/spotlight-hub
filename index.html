<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotlight Trilogy — English Textbooks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C1F26">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spotlight">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EE;
    --cream-dark: #EDE8DD;
    --slate: #1C1F26;
    --slate-mid: #3D4351;
    --slate-light: #6B7280;
    --accent-1: #C8603A;
    --accent-2: #3A6B8A;
    --accent-3: #4A7C59;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--slate);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247, 244, 238, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(28, 31, 38, 0.07);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .nav-logo {
    font-family: var(--serif);
    font-size: 1.1rem;
    color: var(--slate);
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .nav-logo span { color: var(--accent-1); }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a {
    font-size: 0.875rem;
    color: var(--slate-light);
    text-decoration: none;
    font-weight: 400;
    transition: color var(--transition);
  }
  .nav-links a:hover { color: var(--slate); }
  .btn-install-nav {
    display: none;
    align-items: center; gap: 0.4rem;
    padding: 6px 14px; border-radius: 99px;
    font-size: 0.8rem; font-weight: 500; font-family: var(--sans);
    background: var(--accent-1); color: #fff;
    border: none; cursor: pointer;
    transition: opacity 0.2s; white-space: nowrap;
  }
  .btn-install-nav.visible { display: inline-flex; }
  .btn-install-nav:hover { opacity: 0.85; }

  /* HERO */
  .hero {
    max-width: 820px;
    margin: 0 auto;
    padding: 5.5rem 2rem 3rem;
    text-align: center;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate-light);
    margin-bottom: 1.5rem;
    background: rgba(28,31,38,0.05);
    border: 1px solid rgba(28,31,38,0.08);
    padding: 5px 14px;
    border-radius: 99px;
  }
  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(2.8rem, 7vw, 4.5rem);
    line-height: 1.08;
    letter-spacing: -0.025em;
    color: var(--slate);
    margin-bottom: 1.25rem;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent-1);
  }
  .hero p {
    font-size: 1.05rem;
    color: var(--slate-mid);
    max-width: 500px;
    margin: 0 auto 3rem;
    font-weight: 300;
    line-height: 1.8;
  }

  /* DIVIDER */
  .divider {
    width: 40px; height: 1px;
    background: rgba(28,31,38,0.12);
    border: none;
    margin: 0 auto 4rem;
  }

  /* BOOK CARDS */
  .books-section {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 2rem 7rem;
  }
  .section-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate-light);
    margin-bottom: 1.5rem;
  }

  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .book-card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid rgba(28, 31, 38, 0.07);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    position: relative;
  }
  .book-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(28, 31, 38, 0.10);
    border-color: rgba(28, 31, 38, 0.12);
  }

  /* Coloured left accent instead of top banner */
  .book-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }
  .book-card-1::before { background: var(--accent-1); }
  .book-card-2::before { background: var(--accent-2); }
  .book-card-3::before { background: var(--accent-3); }

  .book-card-body {
    padding: 1.75rem 1.75rem 1.25rem 2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .book-number {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .book-card-1 .book-number { color: var(--accent-1); }
  .book-card-2 .book-number { color: var(--accent-2); }
  .book-card-3 .book-number { color: var(--accent-3); }

  .book-title {
    font-family: var(--serif);
    font-size: 1.55rem;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.75rem;
    color: var(--slate);
  }

  .book-level {
    font-size: 0.78rem;
    color: var(--slate-light);
    font-weight: 400;
    margin-bottom: 1.25rem;
  }

  .book-stats {
    display: flex;
    gap: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--cream-dark);
    margin-top: auto;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-num {
    font-family: var(--serif);
    font-size: 1.35rem;
    color: var(--slate);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.68rem;
    color: var(--slate-light);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 500;
  }

  /* Single CTA */
  .book-cta {
    padding: 1rem 1.75rem 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cta-text {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--slate-mid);
    transition: color var(--transition);
  }
  .book-card:hover .cta-text { color: var(--slate); }
  .cta-arrow {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(28,31,38,0.12);
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), border-color var(--transition), transform var(--transition);
  }
  .book-card:hover .cta-arrow { transform: translateX(3px); }
  .book-card-1:hover .cta-arrow { background: var(--accent-1); border-color: var(--accent-1); }
  .book-card-2:hover .cta-arrow { background: var(--accent-2); border-color: var(--accent-2); }
  .book-card-3:hover .cta-arrow { background: var(--accent-3); border-color: var(--accent-3); }
  .book-card:hover .cta-arrow svg path { stroke: #fff; }
  .cta-arrow svg { display: block; }

  /* FOOTER */
  footer {
    border-top: 1px solid rgba(28,31,38,0.07);
    padding: 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--slate-light);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero { animation: fadeUp 0.55s ease both; }
  .book-card:nth-child(1) { animation: fadeUp 0.5s 0.12s ease both; }
  .book-card:nth-child(2) { animation: fadeUp 0.5s 0.22s ease both; }
  .book-card:nth-child(3) { animation: fadeUp 0.5s 0.32s ease both; }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .hero { padding: 3.5rem 1.25rem 2rem; }
    .books-section { padding: 0 1rem 5rem; }
    .book-card-body { padding: 1.5rem 1.5rem 1rem 1.75rem; }
    .book-cta { padding: 0.85rem 1.5rem 0.85rem 1.75rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Spotlight <span>Trilogy</span></a>
  <div class="nav-links">
    <a href="#books">Books</a>
    <button class="btn-install-nav" id="btn-install" onclick="triggerInstall()">
      <svg width="13" height="13" fill="none" viewBox="0 0 14 14"><path d="M7 2v7M4 6.5 7 10l3-3.5M2 12h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Install
    </button>
  </div>
</nav>

<section class="hero">
  <p class="hero-eyebrow">
    <svg width="12" height="12" fill="none" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M6 3.5v3l1.5 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    English Language Textbooks
  </p>
  <h1>The <em>Spotlight</em><br>Trilogy</h1>
  <p>A complete English language learning series for grades 7–9. Browse each book's units, then download student books, teacher guides, and audio files.</p>
  <hr class="divider">
</section>

<section class="books-section" id="books">
  <p class="section-label">Choose a book</p>
  <div class="books-grid" id="books-grid">
    <!-- populated by JS -->
  </div>
</section>

<footer>
  Spotlight Trilogy &mdash; English Textbooks
</footer>

<script src="data.js"></script>
<script>
  const ACCENTS = ['#C8603A', '#3A6B8A', '#4A7C59'];
  const LEVELS  = ['7th Grade', '8th Grade', '9th Grade'];

  function countItems(book) {
    let units = 0, lessons = 0, audios = 0;
    function walk(node, depth = 0) {
      if (node.type === 'mp3') audios++;
      if (node.type === 'folder') {
        if (depth === 0 && /^unit/i.test(node.name)) units++;
        if (/^lesson/i.test(node.name)) lessons++;
        if (node.children) node.children.forEach(c => walk(c, depth + 1));
      }
    }
    book.children.forEach(c => walk(c, 0));
    return { units, lessons, audios };
  }

  const grid = document.getElementById('books-grid');

  SPOTLIGHT_DATA.forEach((book, i) => {
    const { units, lessons, audios } = countItems(book);
    const num = i + 1;

    grid.innerHTML += `
      <a class="book-card book-card-${num}" href="book.html?book=${num}">
        <div class="book-card-body">
          <p class="book-number">Book ${num}</p>
          <h2 class="book-title">${book.name}</h2>
          <p class="book-level">${LEVELS[i]} &mdash; Student Book · Teacher Guide · Audio</p>
          <div class="book-stats">
            <div class="stat">
              <span class="stat-num">${units}</span>
              <span class="stat-label">Units</span>
            </div>
            <div class="stat">
              <span class="stat-num">${lessons}</span>
              <span class="stat-label">Lessons</span>
            </div>
            <div class="stat">
              <span class="stat-num">${audios}</span>
              <span class="stat-label">Audio files</span>
            </div>
          </div>
        </div>
        <div class="book-cta">
          <span class="cta-text">Browse lessons</span>
          <span class="cta-arrow">
            <svg width="13" height="13" fill="none" viewBox="0 0 14 14">
              <path d="M3 7h8M7.5 3.5 11 7l-3.5 3.5" stroke="#1C1F26" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </a>
    `;
  });
</script>

<script>
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  const btn = document.getElementById('btn-install');
  if (btn) btn.classList.add('visible');
});
window.addEventListener('appinstalled', () => {
  _installPrompt = null;
  const btn = document.getElementById('btn-install');
  if (btn) btn.classList.remove('visible');
});
async function triggerInstall() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  const { outcome } = await _installPrompt.userChoice;
  if (outcome === 'accepted') _installPrompt = null;
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
